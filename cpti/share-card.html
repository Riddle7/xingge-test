<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刑格 CPTI · 分享图生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 {
    font-family: ui-monospace, 'SF Mono', Consolas, monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #818cf8;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .sub {
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 32px;
  }
  canvas {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 8px;
    max-width: 100%;
    height: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }
  .actions {
    margin-top: 28px;
    display: flex;
    gap: 12px;
  }
  button {
    background: #4f46e5;
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, transform 0.15s;
  }
  button:hover { background: #4338ca; transform: translateY(-1px); }
  button.secondary {
    background: transparent;
    border: 1px solid #334155;
    color: #cbd5e1;
  }
  button.secondary:hover { background: #1e293b; }
</style>
</head>
<body>
  <h1>CPTI · Share Card Generator</h1>
  <p class="sub">点击下载生成 1200×630 PNG（用于微信/Twitter/Facebook OG 分享图）</p>
  <canvas id="cv" width="1200" height="630"></canvas>
  <div class="actions">
    <button onclick="downloadPNG()">下载 og-image.png</button>
    <button class="secondary" onclick="window.history.back()">返回</button>
  </div>

<script>
(function() {
  // ===== 赛博朋克学术风分享图（1200x630） =====
  // 设计语言：indigo 主色 + mono 字体 + slate 深底 + 扫描线/网格
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var W = 1200, H = 630;

  // 颜色（与 cpti/index.html 一致）
  var C = {
    bg:        '#0f172a',  // slate-900
    bgGrid:    '#1e293b',  // slate-800
    bgGridDim: '#172033',
    indigo:    '#4f46e5',  // 主色
    indigoLt:  '#818cf8',  // indigo-400
    amber:     '#f59e0b',  // 强调
    slate400:  '#94a3b8',
    slate500:  '#64748b',
    slate300:  '#cbd5e1',
    slate100:  '#f1f5f9',
    white:     '#ffffff'
  };
  var monoF = "ui-monospace, 'SF Mono', Consolas, 'Liberation Mono', monospace";
  var sansF = "'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif";

  // ===== 1. 背景 + 渐变 =====
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // 左侧 indigo 微辉光（径向）
  var glow = ctx.createRadialGradient(200, 200, 0, 200, 200, 600);
  glow.addColorStop(0, 'rgba(79, 70, 229, 0.18)');
  glow.addColorStop(1, 'rgba(79, 70, 229, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // 右侧 amber 微辉光
  var glow2 = ctx.createRadialGradient(1050, 450, 0, 1050, 450, 500);
  glow2.addColorStop(0, 'rgba(245, 158, 11, 0.10)');
  glow2.addColorStop(1, 'rgba(245, 158, 11, 0)');
  ctx.fillStyle = glow2;
  ctx.fillRect(0, 0, W, H);

  // ===== 2. 网格背景（赛博朋克终端） =====
  ctx.strokeStyle = C.bgGridDim;
  ctx.lineWidth = 1;
  var gridSize = 40;
  for (var x = 0; x <= W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x + 0.5, 0);
    ctx.lineTo(x + 0.5, H);
    ctx.stroke();
  }
  for (var y = 0; y <= H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(W, y + 0.5);
    ctx.stroke();
  }

  // 主网格线（每 200px 加重）
  ctx.strokeStyle = C.bgGrid;
  ctx.lineWidth = 1;
  for (var x2 = 0; x2 <= W; x2 += 200) {
    ctx.beginPath();
    ctx.moveTo(x2 + 0.5, 0);
    ctx.lineTo(x2 + 0.5, H);
    ctx.stroke();
  }
  for (var y2 = 0; y2 <= H; y2 += 200) {
    ctx.beginPath();
    ctx.moveTo(0, y2 + 0.5);
    ctx.lineTo(W, y2 + 0.5);
    ctx.stroke();
  }

  // ===== 3. 顶部扫描线装饰 =====
  // 顶部细 indigo 线
  ctx.strokeStyle = C.indigo;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(W, 0);
  ctx.stroke();

  // 顶部第二条（带间隔感）
  ctx.strokeStyle = 'rgba(129, 140, 248, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 4);
  ctx.lineTo(W, 4);
  ctx.stroke();

  // 底部线
  ctx.strokeStyle = 'rgba(129, 140, 248, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - 4);
  ctx.lineTo(W, H - 4);
  ctx.stroke();

  ctx.strokeStyle = C.indigo;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(W, H);
  ctx.stroke();

  // ===== 4. 左上角：CPTI 标识（mono） =====
  ctx.font = '600 16px ' + monoF;
  ctx.fillStyle = C.indigoLt;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('// CPTI v2.0', 64, 56);

  // 右上角：状态点（赛博朋克终端状态指示）
  ctx.font = '500 13px ' + monoF;
  ctx.fillStyle = C.slate500;
  ctx.textAlign = 'right';
  ctx.fillText('READY', W - 64, 60);

  // 右上角状态点
  ctx.fillStyle = C.amber;
  ctx.beginPath();
  ctx.arc(W - 64 - 60, 67, 4, 0, Math.PI * 2);
  ctx.fill();
  // 微辉光
  ctx.fillStyle = 'rgba(245, 158, 11, 0.3)';
  ctx.beginPath();
  ctx.arc(W - 64 - 60, 67, 8, 0, Math.PI * 2);
  ctx.fill();

  // ===== 5. 中央左侧：主标题区 =====
  // "刑格" 大字（中文显示主标题）
  ctx.fillStyle = C.slate100;
  ctx.font = '700 120px ' + sansF;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.fillText('刑格', 64, 290);

  // "CPTI" mono 标识（紧跟在"刑格"右侧）
  ctx.fillStyle = C.indigoLt;
  ctx.font = '700 88px ' + monoF;
  // 测量"刑格"宽度以定位 CPTI
  ctx.font = '700 120px ' + sansF;
  var titleW = ctx.measureText('刑格').width;
  ctx.fillStyle = C.indigoLt;
  ctx.font = '700 72px ' + monoF;
  ctx.fillText('CPTI', 64 + titleW + 24, 285);

  // 副标题
  ctx.fillStyle = C.slate300;
  ctx.font = '400 28px ' + sansF;
  ctx.fillText('你的刑法人格鉴定书', 64, 340);

  // 描述（mono 风格标签）
  ctx.fillStyle = C.slate400;
  ctx.font = '500 16px ' + monoF;
  ctx.fillText('16 题  ·  约 5 分钟  ·  四维人格坐标系', 64, 388);

  // 装饰：标题下方的 indigo 分隔线
  ctx.strokeStyle = C.indigo;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(64, 410);
  ctx.lineTo(64 + 80, 410);
  ctx.stroke();

  // 分隔线后续 slate-700 细线
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(64 + 80 + 8, 410);
  ctx.lineTo(64 + 280, 410);
  ctx.stroke();

  // ===== 6. 右侧：四维字母组合（赛博朋克终端风） =====
  // S/O · F/M · R/P · E/Re
  var dims = [
    { letters: ['S', 'O'], label: '立场', color: C.indigoLt },
    { letters: ['F', 'M'], label: '解释', color: C.amber },
    { letters: ['R', 'P'], label: '目的', color: C.indigoLt },
    { letters: ['E', 'Re'], label: '边界', color: C.amber }
  ];

  var dimBoxX = 780;
  var dimBoxY = 180;
  var dimBoxW = 380;
  var dimBoxH = 280;
  var cellW = dimBoxW / 2;
  var cellH = dimBoxH / 2;

  // 容器边框
  ctx.strokeStyle = '#334155';
  ctx.lineWidth = 1;
  ctx.strokeRect(dimBoxX + 0.5, dimBoxY + 0.5, dimBoxW, dimBoxH);

  // 四角装饰（赛博朋克角标）
  function corner(x, y, dx, dy) {
    ctx.strokeStyle = C.indigo;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + dy * 12);
    ctx.lineTo(x, y);
    ctx.lineTo(x + dx * 12, y);
    ctx.stroke();
  }
  corner(dimBoxX, dimBoxY, 1, 1);
  corner(dimBoxX + dimBoxW, dimBoxY, -1, 1);
  corner(dimBoxX, dimBoxY + dimBoxH, 1, -1);
  corner(dimBoxX + dimBoxW, dimBoxY + dimBoxH, -1, -1);

  // 容器标签
  ctx.font = '500 12px ' + monoF;
  ctx.fillStyle = C.slate500;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('FOUR-DIMENSIONAL MATRIX', dimBoxX, dimBoxY - 22);

  ctx.textAlign = 'right';
  ctx.fillText('[ 4×4 ]', dimBoxX + dimBoxW, dimBoxY - 22);

  // 绘制 4 个维度
  for (var i = 0; i < 4; i++) {
    var col = i % 2;
    var row = Math.floor(i / 2);
    var cx = dimBoxX + col * cellW + cellW / 2;
    var cy = dimBoxY + row * cellH + cellH / 2;

    // 网格分隔线
    if (col === 1) {
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dimBoxX + cellW + 0.5, dimBoxY);
      ctx.lineTo(dimBoxX + cellW + 0.5, dimBoxY + dimBoxH);
      ctx.stroke();
    }
    if (row === 1) {
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dimBoxX, dimBoxY + cellH + 0.5);
      ctx.lineTo(dimBoxX + dimBoxW, dimBoxY + cellH + 0.5);
      ctx.stroke();
    }

    var d = dims[i];

    // 字母对（如 "S / O"）
    ctx.font = '700 44px ' + monoF;
    ctx.fillStyle = d.color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var letterText = d.letters[0] + ' / ' + d.letters[1];
    ctx.fillText(letterText, cx, cy - 8);

    // 维度标签
    ctx.font = '500 13px ' + sansF;
    ctx.fillStyle = C.slate400;
    ctx.fillText(d.label, cx, cy + 28);
  }

  // ===== 7. 底部：网站信息 + 二维码占位 =====
  // 左下：域名
  ctx.font = '500 14px ' + monoF;
  ctx.fillStyle = C.slate400;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('generative-jurisprudence.top', 64, H - 56);

  // 域名下的描述行
  ctx.font = '400 12px ' + monoF;
  ctx.fillStyle = C.slate500;
  ctx.fillText('Generative Jurisprudence · 生成式法学', 64, H - 36);

  // 右下：CTA 标签
  ctx.font = '600 14px ' + monoF;
  ctx.fillStyle = C.indigoLt;
  ctx.textAlign = 'right';
  ctx.fillText('→ 测出你的刑法人格', W - 64, H - 56);

  ctx.font = '400 12px ' + monoF;
  ctx.fillStyle = C.slate500;
  ctx.fillText('scan to start', W - 64, H - 36);

  // ===== 8. 微微的 RGB 偏移（赛博朋克 glitch 装饰，仅左上标题） =====
  // 在主标题"刑格"上叠加微弱的红/蓝偏移（仅几个像素）
  ctx.globalCompositeOperation = 'screen';
  ctx.font = '700 120px ' + sansF;
  ctx.fillStyle = 'rgba(244, 63, 94, 0.18)'; // rose-500
  ctx.fillText('刑格', 64 + 2, 290);
  ctx.fillStyle = 'rgba(34, 211, 238, 0.18)'; // cyan-400
  ctx.fillText('刑格', 64 - 2, 290);
  ctx.globalCompositeOperation = 'source-over';

  // ===== 9. 边角装饰：左上和右下的角标线 =====
  // 左上角
  ctx.strokeStyle = C.indigo;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(40, 40);
  ctx.lineTo(40, 80);
  ctx.moveTo(40, 40);
  ctx.lineTo(80, 40);
  ctx.stroke();

  // 右下角
  ctx.beginPath();
  ctx.moveTo(W - 40, H - 40);
  ctx.lineTo(W - 40, H - 80);
  ctx.moveTo(W - 40, H - 40);
  ctx.lineTo(W - 80, H - 40);
  ctx.stroke();
})();

function downloadPNG() {
  var cv = document.getElementById('cv');
  var link = document.createElement('a');
  link.download = 'og-image.png';
  link.href = cv.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
