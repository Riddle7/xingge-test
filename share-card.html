<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Jurisprudence · Share Card Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f2f2f7;
    color: #1d1d1f;
    font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 {
    font-family: "JetBrains Mono", ui-monospace, Consolas, monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #007aff;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .sub {
    color: #6e6e73;
    font-size: 13px;
    margin-bottom: 32px;
  }
  canvas {
    background: #ffffff;
    border: 1px solid #e5e5ea;
    border-radius: 12px;
    max-width: 100%;
    height: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.08);
  }
  .actions {
    margin-top: 28px;
    display: flex;
    gap: 12px;
  }
  button {
    background: #007aff;
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, transform 0.15s;
  }
  button:hover { background: #0064d6; transform: translateY(-1px); }
  button.secondary {
    background: transparent;
    border: 1px solid #d1d1d6;
    color: #1d1d1f;
  }
  button.secondary:hover { background: #f2f2f7; }
</style>
</head>
<body>
  <h1>Generative Jurisprudence · Share Card</h1>
  <p class="sub">1200×1200 正方形 · 微信 OG 分享图（目标 &lt; 200KB）</p>
  <canvas id="cv" width="1200" height="1200"></canvas>
  <div class="actions">
    <button onclick="downloadPNG()">下载 og-image.png</button>
    <button class="secondary" onclick="window.history.back()">返回</button>
  </div>

<script>
(function() {
  // ===== Apple 浅色风分享图（1200×1200 正方形） =====
  // 设计语言：白底 + #007aff 品牌蓝 + DM Sans + JetBrains Mono
  // 布局：顶部品牌条 / 中央巨型标题 / 三栏导航 / 底部域名
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var W = 1200, H = 1200;

  // 颜色（与主站 :root 一致）
  var C = {
    bg:        '#ffffff',
    bgSoft:    '#f7f7fa',
    bgCard:    '#fbfbfd',
    brand:     '#007aff',
    brandDark: '#004fad',
    brandSoft: '#e8f2ff',
    ink:       '#1d1d1f',
    ink2:      '#3a3a3c',
    muted:     '#6e6e73',
    mutedLt:   '#8e8e93',
    border:    '#e5e5ea',
    borderDk:  '#d1d1d6'
  };
  var sansF = '"DM Sans", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif';
  var monoF = '"JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace';

  // ===== 1. 白色背景 =====
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // ===== 2. 顶部品牌条（0-120px） =====
  // 顶部品牌蓝细线
  ctx.fillStyle = C.brand;
  ctx.fillRect(0, 0, W, 4);

  // 左上：mono 品牌标识
  ctx.font = '600 18px ' + monoF;
  ctx.fillStyle = C.brand;
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('GENERATIVE JURISPRUDENCE', 80, 56);

  // 右上：版本标识（mono）
  ctx.font = '500 14px ' + monoF;
  ctx.fillStyle = C.mutedLt;
  ctx.textAlign = 'right';
  ctx.fillText('GJ // 001', W - 80, 60);

  // 顶部下方分隔线
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 120);
  ctx.lineTo(W - 80, 120);
  ctx.stroke();

  // ===== 3. 中央 Hero 区（120-720px） =====
  // 巨型中文主标题（居中）
  ctx.fillStyle = C.ink;
  ctx.font = '800 200px ' + sansF;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText('生成式法学', W / 2, 360);

  // 标题下方品牌蓝小色条（视觉锚点）
  ctx.fillStyle = C.brand;
  ctx.fillRect(W / 2 - 40, 480, 80, 6);

  // 英文副标题
  ctx.fillStyle = C.muted;
  ctx.font = '500 28px ' + monoF;
  ctx.fillText('Generative Jurisprudence', W / 2, 540);

  // 中文副标题（核心 slogan）
  ctx.fillStyle = C.ink2;
  ctx.font = '500 36px ' + sansF;
  ctx.fillText('AI 时代的法律理论探索期刊', W / 2, 600);

  // 描述行（小字 mono）
  ctx.fillStyle = C.mutedLt;
  ctx.font = '400 18px ' + monoF;
  ctx.fillText('以代码重写法理  ·  以对话生成学说', W / 2, 660);

  // ===== 4. 三栏导航卡片（720-1040px） =====
  var cards = [
    { label: '01', title: '碰撞', en: 'COLLIDE', desc: '立场对话' },
    { label: '02', title: '阅读', en: 'READ',    desc: '论文与札记' },
    { label: '03', title: '实验室', en: 'LAB',   desc: '项目缘起' }
  ];

  var cardY = 760;
  var cardH = 240;
  var cardGap = 20;
  var cardW = (W - 160 - cardGap * 2) / 3;  // 两侧各 80px 边距

  for (var i = 0; i < 3; i++) {
    var cx = 80 + i * (cardW + cardGap);
    var c = cards[i];

    // 第一个卡片用品牌蓝填充作为视觉锚点
    if (i === 0) {
      ctx.fillStyle = C.brand;
      ctx.fillRect(cx, cardY, cardW, cardH);
    } else {
      // 其他卡片用极淡背景 + 边框
      ctx.fillStyle = C.bgCard;
      ctx.fillRect(cx, cardY, cardW, cardH);
      ctx.strokeStyle = C.border;
      ctx.lineWidth = 1;
      ctx.strokeRect(cx + 0.5, cardY + 0.5, cardW, cardH);
    }

    // 编号（mono，左上）
    ctx.font = '500 16px ' + monoF;
    ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.7)' : C.mutedLt;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(c.label, cx + 28, cardY + 28);

    // 英文标签（mono，右上）
    ctx.font = '500 13px ' + monoF;
    ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.85)' : C.brand;
    ctx.textAlign = 'right';
    ctx.fillText(c.en, cx + cardW - 28, cardY + 30);

    // 中文标题（大，居中偏上）
    ctx.font = '700 56px ' + sansF;
    ctx.fillStyle = i === 0 ? '#ffffff' : C.ink;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.title, cx + cardW / 2, cardY + cardH / 2 - 8);

    // 描述（小字，居中偏下）
    ctx.font = '400 16px ' + sansF;
    ctx.fillStyle = i === 0 ? 'rgba(255,255,255,0.75)' : C.muted;
    ctx.fillText(c.desc, cx + cardW / 2, cardY + cardH - 36);
  }

  // ===== 5. 底部信息区（1040-1200px） =====
  // 上方分隔线
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 1060);
  ctx.lineTo(W - 80, 1060);
  ctx.stroke();

  // 左下：URL
  ctx.font = '500 18px ' + monoF;
  ctx.fillStyle = C.ink;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('riddle7.github.io/xingge-test', 80, 1110);

  // URL 下方描述
  ctx.font = '400 13px ' + monoF;
  ctx.fillStyle = C.mutedLt;
  ctx.fillText('Scan or visit to explore', 80, 1140);

  // 右下：品牌签名
  ctx.font = '600 14px ' + monoF;
  ctx.fillStyle = C.brand;
  ctx.textAlign = 'right';
  ctx.fillText('GJ · 2026', W - 80, 1110);

  ctx.font = '400 13px ' + monoF;
  ctx.fillStyle = C.mutedLt;
  ctx.fillText('Generative Jurisprudence', W - 80, 1140);

  // 底部品牌蓝细线（与顶部呼应）
  ctx.fillStyle = C.brand;
  ctx.fillRect(0, H - 4, W, 4);
})();

function downloadPNG() {
  var cv = document.getElementById('cv');
  var link = document.createElement('a');
  link.download = 'og-image.png';
  link.href = cv.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
